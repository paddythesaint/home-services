name: Deploy backend functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: functions-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install function dependencies
        working-directory: functions
        run: npm install --omit=dev

      # Secrets are passed through env vars, never inlined into the shell
      # script — inline substitution mangles JSON quoting (that exact bug
      # broke deploy run #1: firebase-tools read a corrupt credentials file
      # and reported "Failed to authenticate").
      - name: Write runtime env
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" > functions/.env
          printf 'GMAIL_CLIENT_ID=%s\n' "$GMAIL_CLIENT_ID" >> functions/.env
          printf 'GMAIL_CLIENT_SECRET=%s\n' "$GMAIL_CLIENT_SECRET" >> functions/.env
          printf 'GMAIL_REFRESH_TOKEN=%s\n' "$GMAIL_REFRESH_TOKEN" >> functions/.env

      - name: Write deploy credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SA_JSON" > "$RUNNER_TEMP/gcp-sa.json"

      - name: Deploy to Cloud Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
        run: >
          npx firebase-tools@13 deploy
          --only functions
          --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
          --non-interactive --force
